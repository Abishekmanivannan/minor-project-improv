<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="background-orb orb-one"></div>
    <div class="background-orb orb-two"></div>

    <div class="auth-shell">
        <div class="auth-card">
            <div class="brand-block">
                <div class="brand-icon">✦</div>
                <div>
                    <p class="eyebrow">College Portal</p>
                    <h1>Student Management System</h1>
                </div>
            </div>

            <h2>Teacher Login</h2>
            <p class="subtitle">Welcome back. Access your student dashboard securely.</p>

            <form id="loginForm">
                <label class="field">
                    <span>Email Address</span>
                    <div class="input-shell">
                        <span class="input-icon">✉</span>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </label>

                <label class="field">
                    <span>Password</span>
                    <div class="input-shell">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                </label>

                <div class="extra-row">
                    <label class="checkbox-row">
                        <input type="checkbox" checked>
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="primary-btn">Login</button>
                <p id="message" class="message"></p>
            </form>

            <p class="register-link">
                Don’t have an account? <a href="teacher-register.html">Register here</a>
            </p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-test.js"></script>
    <script src="login.js"></script>
</body>
</html>
