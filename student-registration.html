<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="student-registration.css">
</head>
<body>
    <div class="page-shell">
        <nav class="top-nav">
            <a class="brand" href="student-registration.html">
                <span class="brand-mark">SM</span>
                <span>Student Hub</span>
            </a>
            <div class="nav-links">
                <a class="nav-link active" href="student-registration.html">Student Registration</a>
                <a class="nav-link" href="student-records.html">Student Records</a>
                <button id="logoutBtn" class="nav-action logout-btn" type="button">Logout</button>
            </div>
        </nav>

        <section class="hero-card">
            <div>
                <p class="eyebrow">Operations</p>
                <h1>Student Registration</h1>
                <p class="subtitle">Create a polished student profile and push it into your live roster instantly.</p>
            </div>
            <div class="hero-chip">Live sync</div>
        </section>

        <section class="content-card">
            <form id="studentForm" class="modern-form">
                <div class="field-grid">
                    <label class="field">
                        <span>Full Name</span>
                        <div class="input-shell">
                            <span class="input-icon">👤</span>
                            <input type="text" id="name" placeholder="Enter full name" required>
                        </div>
                    </label>
                    <label class="field">
                        <span>Roll Number</span>
                        <div class="input-shell">
                            <span class="input-icon">#</span>
                            <input type="text" id="rollNumber" placeholder="Enter roll number" required>
                        </div>
                    </label>
                </div>

                <div class="field-grid">
                    <label class="field">
                        <span>Department</span>
                        <div class="input-shell">
                            <span class="input-icon">🏛</span>
                            <input type="text" id="department" placeholder="Enter department" required>
                        </div>
                    </label>
                    <label class="field">
                        <span>Email Address</span>
                        <div class="input-shell">
                            <span class="input-icon">✉</span>
                            <input type="email" id="email" placeholder="Enter email" required>
                        </div>
                    </label>
                </div>

                <button type="submit" class="primary-btn">Register Student</button>
                <p id="formMessage" class="message"></p>
            </form>
        </section>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-test.js"></script>
    <script src="student-registration.js"></script>
</body>
</html>
